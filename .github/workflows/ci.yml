name: Code Verification (CI)

on: [push, pull_request]

jobs:
  build:
    # This matrix replaces your loop
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    
    # This runs the job once for each OS in the matrix
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      # Note: apt-get only works on Ubuntu. 
      # On macOS/Windows, the compiler is already installed.
      - name: Compile C program
        run: |
          if ( "$RUNNER_OS" == "Windows" ); then
            gcc c-bye/bye.c -o c-bye/bye.exe
          else
            gcc c-bye/bye.c -o c-bye/bye
          fi

      - name: Run application
        run: |
          if ( "$RUNNER_OS" == "Windows" ); then
            ./c-bye/bye.exe
          else
            ./c-bye/bye
          fi
